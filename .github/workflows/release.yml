name: Build and Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag, for example 1.6.9 or v1.6.9'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    name: Build macOS app and publish release
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          tag="${tag#refs/tags/}"
          if [[ "$tag" =~ ^[0-9] ]]; then
            tag="v$tag"
          fi
          if [[ -z "$tag" || ! "$tag" =~ ^v[0-9]+(\.[0-9]+)*([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release tag: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          echo "artifact_name=QuickRecorder-$tag" >> "$GITHUB_OUTPUT"

      - name: Select Xcode
        shell: bash
        run: |
          sudo xcode-select -s /Applications/Xcode.app/Contents/Developer
          xcodebuild -version

      - name: Resolve Swift packages
        shell: bash
        run: |
          xcodebuild -resolvePackageDependencies \
            -project QuickRecorder.xcodeproj \
            -scheme QuickRecorder

      - name: Build Release app
        shell: bash
        run: |
          set -euo pipefail
          xcodebuild \
            -project QuickRecorder.xcodeproj \
            -scheme QuickRecorder \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build

      - name: Package app
        shell: bash
        run: |
          set -euo pipefail
          app_path="build/DerivedData/Build/Products/Release/QuickRecorder.app"
          artifact="${{ steps.release.outputs.artifact_name }}"
          dmg_path="dist/$artifact.dmg"
          test -d "$app_path"
          rm -rf dist dmg-root
          mkdir -p dist dmg-root
          cp -R "$app_path" dmg-root/
          ln -s /Applications dmg-root/Applications
          hdiutil create \
            -volname "QuickRecorder" \
            -srcfolder dmg-root \
            -ov \
            -format UDZO \
            "$dmg_path"
          shasum -a 256 "$dmg_path" > "$dmg_path.sha256"
          ls -lh dist

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.release.outputs.artifact_name }}
          path: |
            dist/${{ steps.release.outputs.artifact_name }}.dmg
            dist/${{ steps.release.outputs.artifact_name }}.dmg.sha256

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          artifact="${{ steps.release.outputs.artifact_name }}"
          if ! git rev-parse "$tag" >/dev/null 2>&1; then
            git tag "$tag" "$GITHUB_SHA"
            git push origin "$tag"
          fi
          gh release create "$tag" \
            "dist/$artifact.dmg" \
            "dist/$artifact.dmg.sha256" \
            --title "$tag" \
            --notes "Automated release for $tag" \
            --verify-tag
